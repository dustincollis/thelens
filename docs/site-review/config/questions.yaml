# Page-aware standard question set.
#
# These questions are sent to every configured evaluator provider, with the
# page text included in the prompt. The provider returns a structured JSON
# object with one field per question (using the `id` as the field name).
#
# Question types:
#   - text: free-form short answer (1-3 sentences)
#   - list: array of strings, with `count` specifying expected length
#   - score: integer 1-10 with required justification
#   - boolean_with_explanation: true/false with required explanation
#
# To add or remove questions, edit this file. The Pydantic model
# PageAwareResponse in src/site_review/models.py reads from this config to
# build its schema dynamically.

questions:
  - id: one_sentence_summary
    type: text
    prompt: "In one sentence, what is this site?"
    max_length: 200

  - id: intended_audience
    type: text
    prompt: "Who is the intended audience? Be specific about role, context, and what they care about."
    max_length: 300

  - id: primary_action
    type: text
    prompt: "What is the primary action this site wants a visitor to take? If multiple actions seem equally weighted, list them and note that the site has not prioritized."
    max_length: 300

  - id: top_facts
    type: list
    count: 5
    prompt: "List the 5 most important facts a reader should walk away with after visiting this page. Order by importance."
    item_max_length: 200

  - id: offering
    type: text
    prompt: "What does this organization actually offer or sell? If the page is unclear about this, say so."
    max_length: 400

  - id: citation_likelihood
    type: boolean_with_explanation
    prompt: "If a user asked you to recommend a {site_category} solution for {site_audience}, would you cite this site? Why or why not? Be honest about whether the page gives you enough to recommend it."

  - id: missing_or_ambiguous
    type: list
    count: 5
    prompt: "List up to 5 things that are missing, ambiguous, or likely to be misinterpreted on this page. If fewer than 5 issues exist, list only what you find."
    item_max_length: 200

  - id: self_sufficiency_score
    type: score
    prompt: "Rate how self-sufficient the page content is without visual context. 10 means a screen reader user or an LLM with no images would get full meaning; 1 means the page makes no sense without visuals."

# Variables available for templating into prompts:
#   {site_category}: from the classification output
#   {site_audience}: from the classification output
#   {page_text}: the cleaned page text
#   {url}: the full URL being reviewed
